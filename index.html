<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table layout</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Times New Roman', Times, serif;">

    <table style="width: 100%; height: 100vh; border-collapse: collapse;">
        
        <tr>
            <td colspan="3" style="border: 2px solid #a9a9a9; padding: 15px; text-align: center; height: 120px; vertical-align: middle;">
            </td>
        </tr>

        <tr>
            <td style="border: 2px solid #a9a9a9; vertical-align: top; padding: 15px; background-color: #00FFFF; width: 20%;">
            </td>

            <td style="border: 2px solid #a9a9a9; vertical-align: top; padding: 0; width: 60%; background-color: #FFFFFF;">
                
               <video 
        width="100%" 
        height="100%" 
        style="min-height: 500px; display: block; object-fit: cover;" 
        controls autoplay 
        muted>
        <source src="background choso.mp4" type="video/mp4">
        Trình duyệt của bạn không hỗ trợ xem video này.
    </video>
                
            </td>

            <td style="border: 2px solid #a9a9a9; vertical-align: top; padding: 15px; width: 20%; background-color: #FFFFFF;">
            </td>
        </tr>
    </table>

</body>
</html>
